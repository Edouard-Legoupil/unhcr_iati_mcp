# UNHCR IATI MCP Server Docker Compose Configuration
# Version: 3.8

services:
  # MCP Server
  mcp:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: unhcr-iati-mcp
    ports:
      - "8000:8000"
    environment:
      # Required IATI Datastore configuration
      - IATI_API_KEY=${IATI_API_KEY}
      - IATI_BASE_URL=${IATI_BASE_URL:-https://api.iatistandard.org/datastore}
      - UNHCR_PUBLISHER_REF=${UNHCR_PUBLISHER_REF:-XM-DAC-41121}
      
      # Optional settings
      - TIMEOUT_SECONDS=${TIMEOUT_SECONDS:-120}
      - PAGE_SIZE=${PAGE_SIZE:-1000}
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
      
      # Python settings
      - PYTHONUNBUFFERED=1
      - PYTHONDONTWRITEBYTECODE=1
    volumes:
      # Mount logs for persistence
      - ./logs:/app/logs
      # Mount .env for development
      - ./.env:/app/.env:ro
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import sys; sys.exit(0)"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    networks:
      - iati-network

  # Redis Cache (Optional)
  # Uncomment to enable caching
  # redis:
  #   image: redis:7-alpine
